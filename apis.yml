apis:
- aid: dynatrace:dynatrace-environment-api
  name: Dynatrace Environment API
  tags:
  - Observability
  - Automation
  - Analytics
  - Intelligence
  - Monitoring
  humanURL: https://docs.dynatrace.com/docs/dynatrace-api/environment-api
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/dynatrace-api/environment-api
    type: Documentation
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/basics/dynatrace-api-authentication
    type: Authentication
  description: >-
    The Dynatrace Environment API provides access to monitoring data and
    configuration settings for a specific Dynatrace environment. It includes
    endpoints for metrics, problems, events, logs, entities, settings, and
    synthetic monitoring, and is the primary API for interacting with
    observability data within a Dynatrace environment.
- aid: dynatrace:dynatrace-metrics-api-v2
  name: Dynatrace Metrics API v2
  tags:
  - Metrics
  - Observability
  - Monitoring
  - Time Series
  humanURL: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/metric-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/metric-v2
    type: Documentation
  - url: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/metric-v2/best-practices
    type: Reference
  - url: openapi/dynatrace-metrics-api-v2-openapi.yml
    type: OpenAPI
  description: >-
    The Dynatrace Metrics API v2 allows you to query, ingest, and manage
    time-series metric data within a Dynatrace environment. It supports
    retrieving metric descriptors, querying data points with flexible selectors,
    and ingesting custom metrics from external sources.
- aid: dynatrace:dynatrace-log-monitoring-api-v2
  name: Dynatrace Log Monitoring API v2
  tags:
  - Logs
  - Log Management
  - Observability
  - Monitoring
  humanURL: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/log-monitoring-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/log-monitoring-v2
    type: Documentation
  - url: openapi/dynatrace-log-monitoring-api-v2-openapi.yml
    type: OpenAPI
  description: >-
    The Dynatrace Log Monitoring API v2 enables ingestion, search, and export
    of log records within a Dynatrace environment. It allows you to stream log
    data to the Grail data lakehouse and retrieve logs programmatically for
    analysis and integration purposes.
- aid: dynatrace:dynatrace-synthetic-api-v2
  name: Dynatrace Synthetic API v2
  tags:
  - Synthetic Monitoring
  - Digital Experience
  - Testing
  - Observability
  humanURL: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/synthetic-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/synthetic-v2
    type: Documentation
  - url: https://docs.dynatrace.com/docs/dynatrace-api/environment-api/synthetic-v2/synthetic-monitor-execution
    type: Reference
  description: >-
    The Dynatrace Synthetic API v2 provides programmatic access to synthetic
    monitoring resources including browser monitors, HTTP monitors, and
    clickpaths. It allows you to create, update, delete, and retrieve synthetic
    monitors and their execution results.
- aid: dynatrace:dynatrace-configuration-api
  name: Dynatrace Configuration API
  tags:
  - Configuration
  - Observability
  - Monitoring
  - Management
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/configuration-api
  baseURL: https://mySampleEnv.live.dynatrace.com/api/config/v1
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/configuration-api
    type: Documentation
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/basics/dynatrace-api-authentication
    type: Authentication
  description: >-
    The Dynatrace Configuration API provides access to environment-level
    configuration settings including alerting profiles, anomaly detection rules,
    application detection rules, and data privacy settings. It supports GET,
    POST, PUT, and DELETE operations for managing Dynatrace environment
    configuration programmatically.
- aid: dynatrace:dynatrace-account-management-api
  name: Dynatrace Account Management API
  tags:
  - Account Management
  - Identity
  - Access Management
  - Administration
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/account-management-api
  baseURL: https://api.dynatrace.com/iam/v1
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/account-management-api
    type: Documentation
  - url: https://docs.dynatrace.com/docs/dynatrace-api/basics/dynatrace-api-authentication/account-api-authentication
    type: Authentication
  - url: https://docs.dynatrace.com/docs/dynatrace-api/account-management-api/user-management-api
    type: Reference
  - url: openapi/dynatrace-account-management-api-openapi.yml
    type: OpenAPI
  description: >-
    The Dynatrace Account Management API allows you to manage your Dynatrace
    account including users, groups, permissions, environments, and service
    users. It uses OAuth 2.0 authentication and enables programmatic management
    of identity and access controls across a Dynatrace account.
- aid: dynatrace:dynatrace-openpipeline-api
  name: Dynatrace OpenPipeline API
  tags:
  - Data Pipelines
  - Data Ingestion
  - Observability
  - Platform
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/platform/openpipeline/reference/openpipeline-api
  baseURL: https://mySampleEnv.live.dynatrace.com/platform
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/platform/openpipeline/reference/openpipeline-api
    type: Documentation
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/platform/openpipeline
    type: Reference
  description: >-
    The Dynatrace OpenPipeline API enables configuration of data ingestion
    pipelines that handle observability, security, and business data from any
    source or format. It provides endpoints for managing pipeline configurations,
    ingest sources, routing rules, and processing stages that feed data into the
    Grail data lakehouse.
- aid: dynatrace:dynatrace-automation-api
  name: Dynatrace Automation API
  tags:
  - Automation
  - Workflows
  - Orchestration
  - Platform
  humanURL: https://docs.dynatrace.com/docs/analyze-explore-automate/workflows
  baseURL: https://mySampleEnv.live.dynatrace.com/platform
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/analyze-explore-automate/workflows
    type: Documentation
  - url: https://developer.dynatrace.com/develop/workflows/
    type: Reference
  - url: https://developer.dynatrace.com/develop/sdks/client-automation/
    type: Client Libraries
  description: >-
    The Dynatrace Automation API provides access to the Workflows automation
    engine, allowing you to create, manage, and execute automated workflows
    within Dynatrace. It supports orchestrating remediation actions, alert
    responses, and multi-step automation tasks through the REST API.
- aid: dynatrace:dynatrace-events-api-v2
  name: Dynatrace Events API v2
  tags:
  - Events
  - Observability
  - Monitoring
  - Alerting
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/events-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/events-v2
    type: Documentation
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/basics/deprecation-migration-guides/events-v1-to-v2
    type: Migration Guide
  - url: openapi/dynatrace-events-api-v2-openapi.yml
    type: OpenAPI
  description: >-
    The Dynatrace Events API v2 enables you to push custom events into Dynatrace
    and retrieve event data from your monitored environment. It supports creating
    deployment events, custom annotations, and information events targeting
    multiple entities in a single POST request, and events sent via v2 are
    subject to DDU licensing.
- aid: dynatrace:dynatrace-problems-api-v2
  name: Dynatrace Problems API v2
  tags:
  - Problems
  - Alerting
  - Observability
  - Monitoring
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/problems-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/problems-v2
    type: Documentation
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/basics/deprecation-migration-guides/problems-v1-to-v2
    type: Migration Guide
  - url: openapi/dynatrace-problems-api-v2-openapi.yml
    type: OpenAPI
  - url: asyncapi/dynatrace-problems-asyncapi.yml
    type: AsyncAPI
  description: >-
    The Dynatrace Problems API v2 allows you to query and manage detected
    problems within a Dynatrace environment. It provides endpoints for listing
    open and closed problems, retrieving problem details including root cause
    analysis, and closing problems programmatically. It improves on v1 by
    supporting entity selectors for multi-entity targeting.
- aid: dynatrace:dynatrace-entities-api-v2
  name: Dynatrace Entities API v2
  tags:
  - Entities
  - Topology
  - Observability
  - Monitoring
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/entity-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/entity-v2
    type: Documentation
  - url: openapi/dynatrace-entities-api-v2-openapi.yml
    type: OpenAPI
  description: >-
    The Dynatrace Entities API v2 enables querying of monitored entities such
    as services, hosts, processes, and applications within a Dynatrace
    environment. It supports filtering entities by type, tags, and management
    zones, and returns entity relationships and properties for topology analysis
    and dependency mapping.
- aid: dynatrace:dynatrace-settings-api-v2
  name: Dynatrace Settings API 2.0
  tags:
  - Configuration
  - Settings
  - Observability
  - Management
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/settings-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/settings-v2
    type: Documentation
  description: >-
    The Dynatrace Settings API 2.0 is the modern, schema-driven configuration
    API for managing Dynatrace environment settings objects. It replaces
    portions of the Configuration API v1 and provides a unified approach to
    reading and writing anomaly detection, alerting, and platform settings
    through versioned schema definitions.
- aid: dynatrace:dynatrace-extensions-api-v2
  name: Dynatrace Extensions API 2.0
  tags:
  - Extensions
  - Integrations
  - Observability
  - Monitoring
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/extensions-v2
  baseURL: https://mySampleEnv.live.dynatrace.com/api/v2
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api/environment-api/extensions-v2
    type: Documentation
  - url: https://docs.dynatrace.com/docs/ingest-from/extensions/manage-extensions
    type: Reference
  description: >-
    The Dynatrace Extensions API 2.0 provides endpoints for managing monitoring
    extensions including uploading, activating, configuring, and removing
    extensions within a Dynatrace environment. It supports the Extensions 2.0
    framework used for custom data collection and integration with third-party
    systems and technologies.
- aid: dynatrace:dynatrace-grail-dql-api
  name: Dynatrace DQL/Grail Query API
  tags:
  - DQL
  - Analytics
  - Query
  - Grail
  - Observability
  humanURL: https://docs.dynatrace.com/docs/platform/grail/dynatrace-query-language/api
  baseURL: https://mySampleEnv.live.dynatrace.com/platform
  image: https://www.dynatrace.com/logo.png
  properties:
  - url: https://docs.dynatrace.com/docs/platform/grail/dynatrace-query-language/api
    type: Documentation
  - url: https://docs.dynatrace.com/docs/platform/grail/dynatrace-query-language
    type: Reference
  - url: https://developer.dynatrace.com/develop/sdks/client-query/
    type: Client Libraries
  description: >-
    The Dynatrace DQL/Grail Query API enables execution of DQL (Dynatrace Query
    Language) queries against the Grail data lakehouse via REST. Queries execute
    asynchronously using a POST to initiate and GET to poll for results, providing
    programmatic access to unified observability, security, and business data
    stored in Grail for custom analytics and automated workflows.
