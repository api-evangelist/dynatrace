specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Dynatrace
providerId: dynatrace
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Observability
  - APM
description: 'FOCUS-aligned FinOps for Dynatrace: per-host/pod/container subscriptions plus consumption
  meters (GiB ingest/retain/query, sessions, synthetic actions) on the Grail platform.'
sources:
  - https://www.dynatrace.com/pricing/
  - https://docs.dynatrace.com/docs/manage/subscription
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Dynatrace LLC
serviceCategory: Observability
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Dynatrace
  ServiceCategory: Observability
  ProviderName: Dynatrace
  PublisherName: Dynatrace LLC
  InvoiceIssuerName: Dynatrace LLC
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: GiB-hour / pod-hour / container-hour / session / GiB
meters:
  - name: host_hours
    unit: host-hour
    aggregation: sum
    dimensions:
      - capability
      - host_size
      - environment
  - name: full_stack_gib_hours
    unit: GiB-hour
    aggregation: sum
    dimensions:
      - host
      - environment
  - name: pod_hours
    unit: pod-hour
    aggregation: sum
    dimensions:
      - cluster
      - namespace
  - name: container_hours
    unit: container-hour
    aggregation: sum
    dimensions:
      - cluster
      - workload
  - name: log_ingest
    unit: GiB
    aggregation: sum
    dimensions:
      - bucket
      - source
  - name: log_retain
    unit: GiB-day
    aggregation: avg
    dimensions:
      - bucket
  - name: log_query_scanned
    unit: GiB
    aggregation: sum
    dimensions:
      - app
  - name: metric_datapoints
    unit: datapoint
    aggregation: sum
    dimensions:
      - source
      - dimension_count
  - name: rum_sessions
    unit: session
    aggregation: sum
    dimensions:
      - app
      - replay
  - name: synthetic_executions
    unit: action
    aggregation: sum
    dimensions:
      - monitor_type
      - location
  - name: appsec_host_months
    unit: host-month
    aggregation: sum
    dimensions:
      - capability
principles:
  - name: Visibility
    description: Use the Account Management API and Subscription page to track DDU/DPS consumption and
      per-capability usage; export usage reports to your data lake for FOCUS mapping.
  - name: Allocation
    description: Tag hosts, services, and Grail buckets with management-zone, team, environment, and
      cost-center metadata; use Dynatrace Cost Allocation app for chargeback.
  - name: Optimization
    description: Tune log ingest with OpenPipeline filters, set retention policies per Grail bucket, downsample
      metrics, and prefer Infrastructure Monitoring over Full-Stack on non-app hosts.
  - name: Accountability
    description: Set DPS budget thresholds and Davis anomaly alerts; review monthly subscription consumption
      against forecast and chargeback to product teams.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
