specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Dynatrace
providerId: dynatrace
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Observability
  - APM
  - Application Security
  - Logs
  - Real User Monitoring
  - Synthetic Monitoring
description: Dynatrace bills consumption-based per capability (host, pod, container, GiB ingest/retain/query,
  session). The Dynatrace API itself is included with any subscription; pricing is driven by underlying
  observability units. Rates below are list pricing in USD; volume and multi-year discounts negotiated
  with sales.
sources:
  - https://www.dynatrace.com/pricing/
plans:
  - id: dynatrace-foundation-discovery
    name: Foundation and Discovery
    type: subscription
    description: Lightweight host discovery and topology mapping. $7/month per host (~$0.01 per host-hour).
    entries:
      - label: Host (monthly)
        name: foundation_host
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '7.00'
        userMultiplied: true
    elements:
      - name: Topology and discovery
      - name: Smartscape mapping
  - id: dynatrace-infrastructure-monitoring
    name: Infrastructure Monitoring
    type: subscription
    description: Server, network, log-volume, and process monitoring. $29/month per host (~$0.04 per host-hour).
    entries:
      - label: Host (monthly)
        name: infra_host
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '29.00'
        userMultiplied: true
    elements:
      - name: OS and process monitoring
      - name: Network performance
      - name: Log inclusion (limited)
  - id: dynatrace-full-stack-monitoring
    name: Full-Stack Monitoring
    type: usage-based
    description: Per memory-GiB-hour billing. $58/month per 8 GiB host (~$0.01 per memory-GiB-hour).
    entries:
      - label: Memory GiB-hour
        name: fullstack_gib_hour
        type: metered
        metric: GiB-hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.01'
        userMultiplied: false
    elements:
      - name: OneAgent automated instrumentation
      - name: Distributed tracing (PurePath)
      - name: Davis AI root-cause analysis
  - id: dynatrace-kubernetes
    name: Kubernetes Platform Monitoring
    type: usage-based
    description: Per pod-hour pricing. $1.40/month per pod (~$0.002 per pod-hour).
    entries:
      - label: Pod-hour
        name: k8s_pod_hour
        type: metered
        metric: pod-hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.002'
        userMultiplied: false
    elements:
      - name: Cluster topology
      - name: Workload metrics
  - id: dynatrace-code-monitoring
    name: Code Monitoring (Containers)
    type: usage-based
    description: Per container-hour pricing. $3.60/month per container (~$0.005 per container-hour).
    entries:
      - label: Container-hour
        name: container_hour
        type: metered
        metric: container-hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.005'
        userMultiplied: false
    elements:
      - name: Container code-level visibility
      - name: Code-level traces
  - id: dynatrace-logs
    name: Log Management and Analytics
    type: usage-based
    description: Pay-per-query or bundled-query model on Grail. Ingest at $0.20 per GiB.
    entries:
      - label: Ingest and process
        name: log_ingest
        type: metered
        metric: GiB
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.20'
        userMultiplied: false
      - label: Retain (pay-per-query)
        name: log_retain_ppq
        type: metered
        metric: GiB-day
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: '0.0007'
        userMultiplied: false
      - label: Query scanned
        name: log_query
        type: metered
        metric: GiB-scanned
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0035'
        userMultiplied: false
      - label: Retain with included queries
        name: log_retain_bundled
        type: metered
        metric: GiB-day
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: '0.02'
        userMultiplied: false
    elements:
      - name: Grail-backed log lakehouse
      - name: DQL (Dynatrace Query Language)
  - id: dynatrace-metrics
    name: Metrics
    type: usage-based
    description: Time-series ingest, retention, and query.
    entries:
      - label: Ingest
        name: metrics_ingest
        type: metered
        metric: datapoints
        limit: -1
        timeFrame: usage
        geo: global
        unit: 100000
        price: '0.15'
        userMultiplied: false
      - label: Retain
        name: metrics_retain
        type: metered
        metric: GiB-day
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: '0.0007'
        userMultiplied: false
    elements:
      - name: Grail metrics store
      - name: Free queries
  - id: dynatrace-traces-events
    name: Traces and Events
    type: usage-based
    description: Distributed-trace and event ingest, retention, and query.
    entries:
      - label: Ingest (traces or events)
        name: trace_event_ingest
        type: metered
        metric: GiB
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.20'
        userMultiplied: false
      - label: Retain
        name: trace_event_retain
        type: metered
        metric: GiB-day
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: '0.0007'
        userMultiplied: false
      - label: Query scanned
        name: trace_event_query
        type: metered
        metric: GiB-scanned
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0035'
        userMultiplied: false
    elements:
      - name: PurePath distributed tracing
      - name: Business events ingestion
  - id: dynatrace-rum
    name: Real User Monitoring
    type: usage-based
    description: Per session-based pricing.
    entries:
      - label: Standard RUM session
        name: rum_session
        type: metered
        metric: session
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '2.25'
        userMultiplied: false
      - label: Session Replay
        name: rum_replay
        type: metered
        metric: session
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '4.50'
        userMultiplied: false
    elements:
      - name: Browser RUM
      - name: Mobile RUM
      - name: Optional Session Replay
  - id: dynatrace-synthetic
    name: Synthetic Monitoring
    type: usage-based
    description: Browser- and HTTP-based synthetic checks.
    entries:
      - label: Browser monitor action
        name: synth_browser
        type: metered
        metric: action
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '4.50'
        userMultiplied: false
      - label: HTTP monitor request
        name: synth_http
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '1.00'
        userMultiplied: false
    elements:
      - name: Public locations
      - name: Private synthetic agents
  - id: dynatrace-application-security
    name: Application Security
    type: subscription
    description: Runtime vulnerability and protection coverage. $13/month per 8 GiB host for analytics
      or protection; $5/month per host for posture.
    entries:
      - label: Runtime Vulnerability Analytics (per 8 GiB host)
        name: secops_rva
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '13.00'
        userMultiplied: true
      - label: Runtime Application Protection (per 8 GiB host)
        name: secops_rap
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '13.00'
        userMultiplied: true
      - label: Security Posture Management (per host)
        name: secops_spm
        type: subscription
        metric: host
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '5.00'
        userMultiplied: true
    elements:
      - name: SCA (third-party libraries)
      - name: CVE detection
      - name: Runtime IAST
  - id: dynatrace-enterprise
    name: Enterprise Negotiated
    type: enterprise
    description: Custom-negotiated discounts, multi-year commitments, and dedicated support.
    entries:
      - label: Negotiated rate
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Volume discounts
      - name: Multi-year commitments
      - name: Dedicated TAM
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
