naftiko: 1.0.0-alpha2
info:
  label: Dynatrace Entity And Topology
  description: Entity discovery and topology mapping workflow combining entities, metrics, and events for developers understanding
    service dependencies and infrastructure layout.
  tags:
  - Dynatrace
  - Entity Management
  - Topology
  - Developer
  - Infrastructure
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    DYNATRACE_API_TOKEN: DYNATRACE_API_TOKEN
    DYNATRACE_ENVIRONMENT_ID: DYNATRACE_ENVIRONMENT_ID
capability:
  consumes:
  - type: http
    namespace: entities-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Entities API v2 for querying monitored entities and entity types.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: entities
      path: /entities
      description: Query monitored entities
      operations:
      - name: list-entities
        method: GET
        description: Returns a list of monitored entities matching the specified entity selector.
        inputParameters:
        - name: entitySelector
          in: query
          type: string
          required: true
          description: Entity selector expression, e.g., type(SERVICE).
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of entities to return per page.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include, e.g., +properties,+tags.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the time range for entity discovery.
        - name: to
          in: query
          type: string
          required: false
          description: End of the time range for entity discovery.
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order, e.g., +displayName or -lastSeenTms.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-detail
      path: /entities/{entityId}
      description: Get a specific entity by ID
      operations:
      - name: get-entity
        method: GET
        description: Returns the details of a specific monitored entity by its entity ID.
        inputParameters:
        - name: entityId
          in: path
          type: string
          required: true
          description: The unique identifier of the entity.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the time range.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-types
      path: /entityTypes
      description: Query entity type definitions
      operations:
      - name: list-entity-types
        method: GET
        description: Returns a list of all entity types available in the environment.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of entity types to return per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-type-detail
      path: /entityTypes/{type}
      description: Get a specific entity type definition
      operations:
      - name: get-entity-type
        method: GET
        description: Returns the definition of a specific entity type.
        inputParameters:
        - name: type
          in: path
          type: string
          required: true
          description: The entity type identifier, e.g., SERVICE, HOST.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-lookup
      path: /entities/lookup
      description: Look up entity by name
      operations:
      - name: lookup-entity
        method: POST
        description: Looks up a specific entity by its display name and type.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            type: '{{tools.type}}'
  - type: http
    namespace: metrics-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Metrics API v2 for querying, ingesting, and managing time-series metrics.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: metrics
      path: /metrics
      description: List metric descriptors
      operations:
      - name: list-metrics
        method: GET
        description: Returns a list of all metrics available in the environment.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of metric descriptors to return per page.
        - name: metricSelector
          in: query
          type: string
          required: false
          description: Metric selector to filter metrics.
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to include in the response.
        - name: writtenSince
          in: query
          type: string
          required: false
          description: Filter to metrics written since this time.
        - name: metricDescriptors
          in: query
          type: boolean
          required: false
          description: Whether to include descriptor details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metric-descriptor
      path: /metrics/{metricKey}
      description: Get or delete a specific metric
      operations:
      - name: get-metric-descriptor
        method: GET
        description: Returns the descriptor for the specified metric key.
        inputParameters:
        - name: metricKey
          in: path
          type: string
          required: true
          description: The key of the metric.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-custom-metric
        method: DELETE
        description: Deletes the specified custom metric from the environment.
        inputParameters:
        - name: metricKey
          in: path
          type: string
          required: true
          description: The key of the custom metric to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metric-query
      path: /metrics/query
      description: Query metric data points
      operations:
      - name: query-metric-data
        method: GET
        description: Returns data points for the specified metrics.
        inputParameters:
        - name: metricSelector
          in: query
          type: string
          required: true
          description: Metric selector expression.
        - name: resolution
          in: query
          type: string
          required: false
          description: Desired time resolution, e.g., 5m, 1h.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: entitySelector
          in: query
          type: string
          required: false
          description: Filter to entities matching this selector.
        - name: mzSelector
          in: query
          type: string
          required: false
          description: Filter to a management zone.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metric-ingest
      path: /metrics/ingest
      description: Ingest custom metrics
      operations:
      - name: ingest-custom-metrics
        method: POST
        description: Ingests custom metric data points using MINT line protocol.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: text
          data: '{{tools.metric_lines}}'
  - type: http
    namespace: events-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Events API v2 for querying and ingesting custom events.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: events
      path: /events
      description: Query events
      operations:
      - name: list-events
        method: GET
        description: Returns a list of events matching the specified filters.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of events to return per page.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: eventSelector
          in: query
          type: string
          required: false
          description: Event selector expression.
        - name: entitySelector
          in: query
          type: string
          required: false
          description: Entity selector to filter events by affected entities.
        - name: eventType
          in: query
          type: string
          required: false
          description: Filter by event type.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-detail
      path: /events/{eventId}
      description: Get a specific event
      operations:
      - name: get-event
        method: GET
        description: Returns the details of a specific event by ID.
        inputParameters:
        - name: eventId
          in: path
          type: string
          required: true
          description: The unique identifier of the event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-ingest
      path: /events/ingest
      description: Ingest custom events
      operations:
      - name: ingest-event
        method: POST
        description: Ingests a custom event into the Dynatrace environment.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            eventType: '{{tools.event_type}}'
            title: '{{tools.title}}'
            entitySelector: '{{tools.entity_selector}}'
            startTime: '{{tools.start_time}}'
            endTime: '{{tools.end_time}}'
            properties: '{{tools.properties}}'
  exposes:
  - type: rest
    port: 8082
    namespace: entity-topology-api
    description: Unified REST API for Dynatrace entity discovery and topology mapping.
    resources:
    - path: /v1/entities
      name: entities
      description: Query monitored entities
      operations:
      - method: GET
        name: list-entities
        description: List entities matching a selector
        call: entities-v2.list-entities
        with:
          entitySelector: rest.entitySelector
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          fields: rest.fields
          from: rest.from
          to: rest.to
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/{entityId}
      name: entity-detail
      description: Get entity details with relationships
      operations:
      - method: GET
        name: get-entity
        description: Get entity details including topology relationships
        call: entities-v2.get-entity
        with:
          entityId: rest.entityId
          fields: rest.fields
          from: rest.from
          to: rest.to
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entity-types
      name: entity-types
      description: Query entity types
      operations:
      - method: GET
        name: list-entity-types
        description: List all entity types
        call: entities-v2.list-entity-types
        with:
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entity-types/{type}
      name: entity-type-detail
      description: Get entity type definition
      operations:
      - method: GET
        name: get-entity-type
        description: Get a specific entity type definition
        call: entities-v2.get-entity-type
        with:
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/lookup
      name: entity-lookup
      description: Look up entity by name
      operations:
      - method: POST
        name: lookup-entity
        description: Look up an entity by display name and type
        call: entities-v2.lookup-entity
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/query
      name: metric-query
      description: Query metrics for entity performance
      operations:
      - method: GET
        name: query-metric-data
        description: Query metric data for entities
        call: metrics-v2.query-metric-data
        with:
          metricSelector: rest.metricSelector
          resolution: rest.resolution
          from: rest.from
          to: rest.to
          entitySelector: rest.entitySelector
          mzSelector: rest.mzSelector
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events
      name: events
      description: Query entity events
      operations:
      - method: GET
        name: list-events
        description: List events for entities
        call: events-v2.list-events
        with:
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          from: rest.from
          to: rest.to
          eventSelector: rest.eventSelector
          entitySelector: rest.entitySelector
          eventType: rest.eventType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/ingest
      name: event-ingest
      description: Ingest deployment events
      operations:
      - method: POST
        name: ingest-event
        description: Ingest a deployment or custom event
        call: events-v2.ingest-event
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: entity-topology-mcp
    transport: http
    description: MCP server for AI-assisted entity discovery and topology mapping.
    tools:
    - name: list-entities
      description: List monitored entities matching a selector expression
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.list-entities
      with:
        entitySelector: tools.entitySelector
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        fields: tools.fields
        from: tools.from
        to: tools.to
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: get-entity
      description: Get entity details including topology relationships
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.get-entity
      with:
        entityId: tools.entityId
        fields: tools.fields
        from: tools.from
        to: tools.to
      outputParameters:
      - type: object
        mapping: $.
    - name: list-entity-types
      description: List all available entity types in the environment
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.list-entity-types
      with:
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-entity-type
      description: Get the definition of a specific entity type
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.get-entity-type
      with:
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-entity
      description: Look up an entity by its display name and type
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: entities-v2.lookup-entity
      with:
        name: tools.name
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: query-metric-data
      description: Query metric data points for entities
      hints:
        readOnly: true
        openWorld: true
      call: metrics-v2.query-metric-data
      with:
        metricSelector: tools.metricSelector
        resolution: tools.resolution
        from: tools.from
        to: tools.to
        entitySelector: tools.entitySelector
        mzSelector: tools.mzSelector
      outputParameters:
      - type: object
        mapping: $.
    - name: list-events
      description: List events affecting entities
      hints:
        readOnly: true
        openWorld: true
      call: events-v2.list-events
      with:
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        from: tools.from
        to: tools.to
        eventSelector: tools.eventSelector
        entitySelector: tools.entitySelector
        eventType: tools.eventType
      outputParameters:
      - type: object
        mapping: $.
    - name: ingest-event
      description: Ingest a deployment or custom event for an entity
      hints:
        readOnly: false
        openWorld: true
      call: events-v2.ingest-event
      with:
        event_type: tools.event_type
        title: tools.title
        entity_selector: tools.entity_selector
        start_time: tools.start_time
        end_time: tools.end_time
        properties: tools.properties
      outputParameters:
      - type: object
        mapping: $.
