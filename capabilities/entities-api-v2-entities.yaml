          description: The cursor for the next page of results, obtained from the nextPageKey field of a previous response.
            When this parameter is set, all other query parameters exce
        - name: pageSize
          in: query
          type: integer
          description: The number of entities to return per page. Default is 50, maximum is 500.
        - name: entitySelector
          in: query
          type: string
          description: 'Defines the scope of the query by specifying entity filter conditions. Required. Use the entity selector
            syntax, for example: type(SERVICE) to select all servic'
          required: true
        - name: fields
          in: query
          type: string
          description: Defines additional fields to include in the entity response beyond the default set. Use a comma-separated
            list. For example, +properties,+tags,+toRelationships.
        - name: from
          in: query
          type: string
          description: 'The start of the time range for entity discovery. Entities seen within this range are returned. Use
            a relative expression (now-7d), ISO 8601, or Unix timestamp '
        - name: to
          in: query
          type: string
          description: The end of the time range for entity discovery. Default is now.
        - name: sort
          in: query
          type: string
          description: Defines the sort order of results. Use the field name prefixed with + (ascending) or - (descending).
            For example, +displayName or -lastSeenTms.
