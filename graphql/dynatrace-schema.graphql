# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  """Fetch details about the current environment."""
  environment(id: ID!): EnvironmentDetails

  """List all Dynatrace environments in the account."""
  environments: [Environment!]!

  """List all management zones."""
  managementZones: [ManagementZone!]!

  """List all network zones."""
  networkZones: [NetworkZone!]!

  """Fetch a single monitored entity by ID."""
  entity(entityId: ID!): EntityDetails

  """Query monitored entities with an entity selector."""
  entities(
    entitySelector: String
    type: String
    tags: [String]
    managementZone: String
    from: String
    to: String
    nextPageKey: String
    pageSize: Int
  ): [Entity!]!

  """List all entity types available in the environment."""
  entityTypes: [EntityType!]!

  """Fetch a service entity by ID."""
  service(entityId: ID!): ServiceDetails

  """List service entities."""
  services(selector: String, tags: [String]): [Service!]!

  """Fetch an application entity by ID."""
  application(entityId: ID!): ApplicationDetails

  """List application entities."""
  applications(selector: String): [Application!]!

  """Fetch a process group by ID."""
  processGroup(entityId: ID!): ProcessGroupDetails

  """List process groups."""
  processGroups(selector: String): [ProcessGroup!]!

  """Fetch a metric descriptor."""
  metricDescriptor(metricKey: String!): MetricDescriptor

  """List metric descriptors matching a selector."""
  metricDescriptors(
    metricSelector: String
    text: String
    pageSize: Int
    nextPageKey: String
  ): [MetricDescriptor!]!

  """Query metric time series data."""
  metricData(
    metricSelector: String!
    resolution: String
    from: String
    to: String
    entitySelector: String
  ): [MetricSeries!]!

  """Fetch a distributed trace by trace ID."""
  trace(traceId: ID!): TraceDetails

  """Fetch a problem by ID."""
  problem(problemId: ID!): ProblemDetails

  """List problems in the environment."""
  problems(
    from: String
    to: String
    status: ProblemStatus
    entitySelector: String
    problemSelector: String
    managementZone: String
    nextPageKey: String
    pageSize: Int
  ): [Problem!]!

  """Fetch an SLO by ID."""
  slo(id: ID!): SLODetails

  """List all SLOs."""
  slos(from: String, to: String, nextPageKey: String): [SLO!]!

  """Fetch a dashboard by ID."""
  dashboard(id: ID!): DashboardDetails

  """List dashboards."""
  dashboards(owner: String): [Dashboard!]!

  """Fetch a synthetic monitor by ID."""
  syntheticMonitor(monitorId: ID!): SyntheticMonitor

  """List synthetic monitors."""
  syntheticMonitors(
    type: SyntheticMonitorType
    enabled: Boolean
    tags: [String]
  ): [SyntheticMonitor!]!

  """Fetch an API token by ID."""
  apiToken(id: ID!): APIToken

  """List API tokens."""
  apiTokens(nextPageKey: String): [APIToken!]!

  """Query events for entities in a time range."""
  events(
    from: String
    to: String
    entitySelector: String
    eventType: String
    nextPageKey: String
  ): [Event!]!

  """Search log records using DQL or a simple query."""
  logRecords(
    query: String
    from: String
    to: String
    limit: Int
    nextSliceKey: String
  ): [LogRecord!]!

  """List audit log entries."""
  auditLogs(
    from: String
    to: String
    filter: String
    sort: String
    nextPageKey: String
  ): [AuditLog!]!

  """Fetch a vulnerability by ID."""
  vulnerability(id: ID!): Vulnerability

  """List detected vulnerabilities."""
  vulnerabilities(
    riskLevel: VulnerabilitySeverity
    status: VulnerabilityStatus
    nextPageKey: String
  ): [Vulnerability!]!

  """List detected runtime attacks."""
  attacks(attackType: AttackType, state: String): [Attack!]!

  """Fetch a workflow by ID."""
  workflow(id: ID!): Workflow

  """List automation workflows."""
  workflows: [Workflow!]!

  """List workflow executions."""
  workflowExecutions(workflowId: ID, status: WorkflowStatus): [WorkflowExecution!]!

  """List available extensions."""
  extensions(nextPageKey: String): [Extension!]!

  """Fetch a Grail storage bucket by name."""
  bucket(id: ID!): Bucket

  """List Grail storage buckets."""
  buckets: [Bucket!]!

  """List stored credentials."""
  credentials(type: CredentialType): [Credential!]!

  """List documents (dashboards, notebooks)."""
  documents(type: String, owner: String): [Document!]!

  """Fetch a document by ID."""
  document(id: ID!): Document

  """List auto-tagging rules."""
  autoTags: [AutoTag!]!

  """Run a Davis AI forecast on a metric."""
  forecast(
    metricKey: String!
    from: String!
    to: String!
    forecastOffset: String!
  ): Forecast

  """List Davis AI anomalies."""
  anomalies(
    metricKey: String
    from: String
    to: String
    entityId: ID
  ): [Anomaly!]!
}

type Mutation {
  """Ingest a custom event targeting entities."""
  createEvent(input: EventInput!): Event

  """Close an open problem with an optional comment."""
  closeProblem(problemId: ID!, comment: String): ProblemDetails

  """Add a comment to a problem."""
  addProblemComment(problemId: ID!, comment: String!): ProblemComment

  """Create a new SLO."""
  createSLO(input: SLOInput!): SLODetails

  """Update an existing SLO."""
  updateSLO(id: ID!, input: SLOInput!): SLODetails

  """Delete an SLO."""
  deleteSLO(id: ID!): Boolean

  """Create a synthetic monitor."""
  createSyntheticMonitor(input: SyntheticMonitorInput!): SyntheticMonitor

  """Update a synthetic monitor."""
  updateSyntheticMonitor(id: ID!, input: SyntheticMonitorInput!): SyntheticMonitor

  """Delete a synthetic monitor."""
  deleteSyntheticMonitor(id: ID!): Boolean

  """Create an API token."""
  createAPIToken(input: APITokenInput!): APIToken

  """Revoke an API token."""
  revokeAPIToken(id: ID!): Boolean

  """Add tags to a monitored entity."""
  tagEntity(entityId: ID!, tags: [TagInput!]!): Entity

  """Remove tags from a monitored entity."""
  untagEntity(entityId: ID!, tags: [String!]!): Entity

  """Ingest log records into Grail."""
  ingestLogRecords(records: [LogRecordInput!]!): Boolean

  """Push metric data via MINT line protocol."""
  ingestMetric(lines: String!): Boolean

  """Ingest a business event for business observability."""
  ingestBusinessEvent(event: BusinessEventInput!): Boolean

  """Create an automation workflow."""
  createWorkflow(input: WorkflowInput!): Workflow

  """Execute an automation workflow."""
  executeWorkflow(id: ID!): WorkflowExecution

  """Delete a workflow."""
  deleteWorkflow(id: ID!): Boolean

  """Create a Grail storage bucket."""
  createBucket(input: BucketInput!): Bucket

  """Delete a Grail storage bucket."""
  deleteBucket(id: ID!): Boolean

  """Store a credential in the vault."""
  createCredential(input: CredentialInput!): Credential

  """Delete a stored credential."""
  deleteCredential(id: ID!): Boolean
}
