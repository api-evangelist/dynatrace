specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Dynatrace
providerId: dynatrace
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Observability
  - APM
description: Dynatrace API rate limits are enforced per environment and per access token. The platform
  does not publish a single rate-limit page; limits vary by API (Environment, Configuration, Account
  Management, OpenPipeline, Davis AI, DQL/Grail Query). Throttled callers receive HTTP 429 with Retry-After.
  Quota for ingest is governed by your subscription (DDU/DPS/host quota), not by raw HTTP request rate.
notes: Dynatrace does not publish per-API rate-limit numbers in a single canonical page. Limits surface
  in the per-API reference and in cluster sizing guides; consumers should rely on Retry-After signaling
  rather than fixed thresholds.
sources:
  - https://docs.dynatrace.com/docs/manage/account-management/api
  - https://docs.dynatrace.com/docs/discover-dynatrace/references/dynatrace-api
headers:
  retryAfter: Retry-After
  rateLimit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: Environment API (per-tenant)
    scope: tenant
    metric: varies
    limit: see Dynatrace API reference per endpoint
  - name: Configuration API (per-tenant)
    scope: tenant
    metric: varies
    limit: see Configuration API reference
  - name: Account Management API
    scope: account
    metric: varies
    limit: see Account Management API reference
  - name: Metrics ingest
    scope: tenant
    metric: data_points_per_minute
    limit: governed by DDU/DPS quota
    notes: Throughput governed by your subscription consumption units rather than HTTP rate.
  - name: Logs ingest
    scope: tenant
    metric: GiB_per_minute
    limit: governed by Log Management entitlement
  - name: DQL/Grail query
    scope: tenant
    metric: concurrent_queries
    limit: see Grail concurrency guidance
policies:
  - name: Retry on 429
    description: Honor the Retry-After header on 429 responses; back off exponentially with jitter.
  - name: Token-scope limits
    description: API tokens carry permission scopes that may impose tighter limits than the tenant default;
      refresh or rotate tokens via the Access Tokens API.
  - name: Subscription-driven quotas
    description: Ingest throughput (metrics, logs, traces) is bounded by Davis Data Units (DDU), Dynatrace
      Platform Subscription (DPS) units, or host capacity, not raw HTTP rate.
  - name: Sandbox vs production
    description: Sandbox environments share lower limits than production tenants; do not load-test against
      sandbox.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
