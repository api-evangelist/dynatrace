naftiko: "1.0.0-alpha1"

info:
  label: "Dynatrace Identity And Access"
  description: "Identity and access management workflow for platform admins managing Dynatrace users, groups, permissions, and environments across the account."
  tags:
    - Dynatrace
    - Identity
    - Access Control
    - Platform Administration
    - IAM
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      DYNATRACE_OAUTH_TOKEN: DYNATRACE_OAUTH_TOKEN

capability:
  consumes:
    - import: account-management
      location: ./shared/account-management.yaml

  exposes:
    - type: rest
      port: 8083
      namespace: identity-access-api
      description: "Unified REST API for Dynatrace identity and access management."
      resources:
        - path: /v1/users
          name: users
          description: "Manage account users"
          operations:
            - method: GET
              name: list-users
              description: "List all users in the account"
              call: "account-management.list-users"
              with:
                accountUuid: "rest.accountUuid"
                nextPageKey: "rest.nextPageKey"
                pageSize: "rest.pageSize"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: "Create a new user"
              call: "account-management.create-user"
              with:
                accountUuid: "rest.accountUuid"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{userId}
          name: user-detail
          description: "Get, update, or delete a specific user"
          operations:
            - method: GET
              name: get-user
              description: "Get user details"
              call: "account-management.get-user"
              with:
                accountUuid: "rest.accountUuid"
                userId: "rest.userId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-user
              description: "Update user profile and groups"
              call: "account-management.update-user"
              with:
                accountUuid: "rest.accountUuid"
                userId: "rest.userId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-user
              description: "Delete a user"
              call: "account-management.delete-user"
              with:
                accountUuid: "rest.accountUuid"
                userId: "rest.userId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups
          name: groups
          description: "Manage user groups"
          operations:
            - method: GET
              name: list-groups
              description: "List all groups"
              call: "account-management.list-groups"
              with:
                accountUuid: "rest.accountUuid"
                nextPageKey: "rest.nextPageKey"
                pageSize: "rest.pageSize"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-group
              description: "Create a new group"
              call: "account-management.create-group"
              with:
                accountUuid: "rest.accountUuid"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups/{groupId}
          name: group-detail
          description: "Get, update, or delete a specific group"
          operations:
            - method: GET
              name: get-group
              description: "Get group details"
              call: "account-management.get-group"
              with:
                accountUuid: "rest.accountUuid"
                groupId: "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-group
              description: "Update group name and description"
              call: "account-management.update-group"
              with:
                accountUuid: "rest.accountUuid"
                groupId: "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-group
              description: "Delete a group"
              call: "account-management.delete-group"
              with:
                accountUuid: "rest.accountUuid"
                groupId: "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/permissions
          name: permissions
          description: "Query permissions"
          operations:
            - method: GET
              name: list-permissions
              description: "List all permissions for the account"
              call: "account-management.list-permissions"
              with:
                accountUuid: "rest.accountUuid"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/environments
          name: environments
          description: "List environments"
          operations:
            - method: GET
              name: list-environments
              description: "List all environments"
              call: "account-management.list-environments"
              with:
                accountUuid: "rest.accountUuid"
                nextPageKey: "rest.nextPageKey"
                pageSize: "rest.pageSize"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9093
      namespace: identity-access-mcp
      transport: http
      description: "MCP server for AI-assisted Dynatrace identity and access management."
      tools:
        - name: list-users
          description: "List all users in the Dynatrace account"
          hints:
            readOnly: true
            openWorld: true
          call: "account-management.list-users"
          with:
            accountUuid: "tools.accountUuid"
            nextPageKey: "tools.nextPageKey"
            pageSize: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: "Create a new user and send an invitation email"
          hints:
            readOnly: false
            openWorld: true
          call: "account-management.create-user"
          with:
            accountUuid: "tools.accountUuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user
          description: "Get details of a specific user"
          hints:
            readOnly: true
            openWorld: true
          call: "account-management.get-user"
          with:
            accountUuid: "tools.accountUuid"
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-user
          description: "Update a user's profile and group memberships"
          hints:
            readOnly: false
            idempotent: true
            openWorld: true
          call: "account-management.update-user"
          with:
            accountUuid: "tools.accountUuid"
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-user
          description: "Permanently remove a user from the account"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          call: "account-management.delete-user"
          with:
            accountUuid: "tools.accountUuid"
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "List all user groups in the account"
          hints:
            readOnly: true
            openWorld: true
          call: "account-management.list-groups"
          with:
            accountUuid: "tools.accountUuid"
            nextPageKey: "tools.nextPageKey"
            pageSize: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-group
          description: "Create a new user group"
          hints:
            readOnly: false
            openWorld: true
          call: "account-management.create-group"
          with:
            accountUuid: "tools.accountUuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-group
          description: "Get details of a specific group"
          hints:
            readOnly: true
            openWorld: true
          call: "account-management.get-group"
          with:
            accountUuid: "tools.accountUuid"
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-group
          description: "Update a group's name and description"
          hints:
            readOnly: false
            idempotent: true
            openWorld: true
          call: "account-management.update-group"
          with:
            accountUuid: "tools.accountUuid"
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-group
          description: "Permanently delete a group"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          call: "account-management.delete-group"
          with:
            accountUuid: "tools.accountUuid"
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-permissions
          description: "List all permissions defined for the account"
          hints:
            readOnly: true
            openWorld: true
          call: "account-management.list-permissions"
          with:
            accountUuid: "tools.accountUuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-environments
          description: "List all environments associated with the account"
          hints:
            readOnly: true
            openWorld: true
          call: "account-management.list-environments"
          with:
            accountUuid: "tools.accountUuid"
            nextPageKey: "tools.nextPageKey"
            pageSize: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."
