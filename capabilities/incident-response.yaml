naftiko: 1.0.0-alpha2
info:
  label: Dynatrace Incident Response
  description: Unified incident response workflow combining problems, events, and entity data for SREs investigating service
    degradations detected by Davis AI.
  tags:
  - Dynatrace
  - Incident Response
  - SRE
  - Problems
  - Events
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    DYNATRACE_API_TOKEN: DYNATRACE_API_TOKEN
    DYNATRACE_ENVIRONMENT_ID: DYNATRACE_ENVIRONMENT_ID
capability:
  consumes:
  - type: http
    namespace: problems-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Problems API v2 for querying and managing AI-detected problems.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: problems
      path: /problems
      description: Query problems
      operations:
      - name: list-problems
        method: GET
        description: Returns a list of problems from the Dynatrace environment.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of problems to return per page.
        - name: problemSelector
          in: query
          type: string
          required: false
          description: Problem selector expression.
        - name: entitySelector
          in: query
          type: string
          required: false
          description: Entity selector to filter by affected entities.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order for results.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: problem-detail
      path: /problems/{problemId}
      description: Get a specific problem
      operations:
      - name: get-problem
        method: GET
        description: Returns the full details of a specific problem.
        inputParameters:
        - name: problemId
          in: path
          type: string
          required: true
          description: The unique identifier of the problem.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: problem-close
      path: /problems/{problemId}/close
      description: Close a problem
      operations:
      - name: close-problem
        method: POST
        description: Closes the specified problem with an optional closing message.
        inputParameters:
        - name: problemId
          in: path
          type: string
          required: true
          description: The unique identifier of the problem.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            message: '{{tools.message}}'
    - name: problem-comments
      path: /problems/{problemId}/comments
      description: Manage problem comments
      operations:
      - name: list-problem-comments
        method: GET
        description: Returns a list of all comments attached to the specified problem.
        inputParameters:
        - name: problemId
          in: path
          type: string
          required: true
          description: The unique identifier of the problem.
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of comments to return per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-problem-comment
        method: POST
        description: Creates a new comment on the specified problem.
        inputParameters:
        - name: problemId
          in: path
          type: string
          required: true
          description: The unique identifier of the problem.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            message: '{{tools.message}}'
            context: '{{tools.context}}'
    - name: problem-comment-detail
      path: /problems/{problemId}/comments/{commentId}
      description: Get, update, or delete a specific comment
      operations:
      - name: get-problem-comment
        method: GET
        description: Returns the details of a specific comment.
        inputParameters:
        - name: problemId
          in: path
          type: string
          required: true
          description: The unique identifier of the problem.
        - name: commentId
          in: path
          type: string
          required: true
          description: The unique identifier of the comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-problem-comment
        method: PUT
        description: Updates the content or context of an existing comment.
        inputParameters:
        - name: problemId
          in: path
          type: string
          required: true
          description: The unique identifier of the problem.
        - name: commentId
          in: path
          type: string
          required: true
          description: The unique identifier of the comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            message: '{{tools.message}}'
            context: '{{tools.context}}'
      - name: delete-problem-comment
        method: DELETE
        description: Permanently deletes a specific comment from a problem.
        inputParameters:
        - name: problemId
          in: path
          type: string
          required: true
          description: The unique identifier of the problem.
        - name: commentId
          in: path
          type: string
          required: true
          description: The unique identifier of the comment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: events-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Events API v2 for querying and ingesting custom events.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: events
      path: /events
      description: Query events
      operations:
      - name: list-events
        method: GET
        description: Returns a list of events matching the specified filters.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of events to return per page.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: eventSelector
          in: query
          type: string
          required: false
          description: Event selector expression.
        - name: entitySelector
          in: query
          type: string
          required: false
          description: Entity selector to filter events by affected entities.
        - name: eventType
          in: query
          type: string
          required: false
          description: Filter by event type.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-detail
      path: /events/{eventId}
      description: Get a specific event
      operations:
      - name: get-event
        method: GET
        description: Returns the details of a specific event by ID.
        inputParameters:
        - name: eventId
          in: path
          type: string
          required: true
          description: The unique identifier of the event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-ingest
      path: /events/ingest
      description: Ingest custom events
      operations:
      - name: ingest-event
        method: POST
        description: Ingests a custom event into the Dynatrace environment.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            eventType: '{{tools.event_type}}'
            title: '{{tools.title}}'
            entitySelector: '{{tools.entity_selector}}'
            startTime: '{{tools.start_time}}'
            endTime: '{{tools.end_time}}'
            properties: '{{tools.properties}}'
  - type: http
    namespace: entities-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Entities API v2 for querying monitored entities and entity types.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: entities
      path: /entities
      description: Query monitored entities
      operations:
      - name: list-entities
        method: GET
        description: Returns a list of monitored entities matching the specified entity selector.
        inputParameters:
        - name: entitySelector
          in: query
          type: string
          required: true
          description: Entity selector expression, e.g., type(SERVICE).
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of entities to return per page.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include, e.g., +properties,+tags.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the time range for entity discovery.
        - name: to
          in: query
          type: string
          required: false
          description: End of the time range for entity discovery.
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order, e.g., +displayName or -lastSeenTms.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-detail
      path: /entities/{entityId}
      description: Get a specific entity by ID
      operations:
      - name: get-entity
        method: GET
        description: Returns the details of a specific monitored entity by its entity ID.
        inputParameters:
        - name: entityId
          in: path
          type: string
          required: true
          description: The unique identifier of the entity.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the time range.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-types
      path: /entityTypes
      description: Query entity type definitions
      operations:
      - name: list-entity-types
        method: GET
        description: Returns a list of all entity types available in the environment.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of entity types to return per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-type-detail
      path: /entityTypes/{type}
      description: Get a specific entity type definition
      operations:
      - name: get-entity-type
        method: GET
        description: Returns the definition of a specific entity type.
        inputParameters:
        - name: type
          in: path
          type: string
          required: true
          description: The entity type identifier, e.g., SERVICE, HOST.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-lookup
      path: /entities/lookup
      description: Look up entity by name
      operations:
      - name: lookup-entity
        method: POST
        description: Looks up a specific entity by its display name and type.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            type: '{{tools.type}}'
  exposes:
  - type: rest
    port: 8080
    namespace: incident-response-api
    description: Unified REST API for Dynatrace incident response workflows.
    resources:
    - path: /v1/problems
      name: problems
      description: Query and manage AI-detected problems
      operations:
      - method: GET
        name: list-problems
        description: List problems detected by Davis AI
        call: problems-v2.list-problems
        with:
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          problemSelector: rest.problemSelector
          entitySelector: rest.entitySelector
          from: rest.from
          to: rest.to
          sort: rest.sort
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/problems/{problemId}
      name: problem-detail
      description: Get problem details including root cause
      operations:
      - method: GET
        name: get-problem
        description: Get full problem details with root cause analysis
        call: problems-v2.get-problem
        with:
          problemId: rest.problemId
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/problems/{problemId}/close
      name: problem-close
      description: Close a problem
      operations:
      - method: POST
        name: close-problem
        description: Close a problem with an optional message
        call: problems-v2.close-problem
        with:
          problemId: rest.problemId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/problems/{problemId}/comments
      name: problem-comments
      description: Manage investigation comments
      operations:
      - method: GET
        name: list-problem-comments
        description: List comments on a problem
        call: problems-v2.list-problem-comments
        with:
          problemId: rest.problemId
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-problem-comment
        description: Add an investigation comment
        call: problems-v2.create-problem-comment
        with:
          problemId: rest.problemId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/problems/{problemId}/comments/{commentId}
      name: problem-comment-detail
      description: Manage a specific comment
      operations:
      - method: GET
        name: get-problem-comment
        description: Get a comment
        call: problems-v2.get-problem-comment
        with:
          problemId: rest.problemId
          commentId: rest.commentId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-problem-comment
        description: Update a comment
        call: problems-v2.update-problem-comment
        with:
          problemId: rest.problemId
          commentId: rest.commentId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-problem-comment
        description: Delete a comment
        call: problems-v2.delete-problem-comment
        with:
          problemId: rest.problemId
          commentId: rest.commentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events
      name: events
      description: Query events related to incidents
      operations:
      - method: GET
        name: list-events
        description: List events matching filters
        call: events-v2.list-events
        with:
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          from: rest.from
          to: rest.to
          eventSelector: rest.eventSelector
          entitySelector: rest.entitySelector
          eventType: rest.eventType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{eventId}
      name: event-detail
      description: Get event details
      operations:
      - method: GET
        name: get-event
        description: Get a specific event
        call: events-v2.get-event
        with:
          eventId: rest.eventId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/ingest
      name: event-ingest
      description: Ingest custom events
      operations:
      - method: POST
        name: ingest-event
        description: Ingest a custom event to annotate the timeline
        call: events-v2.ingest-event
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities
      name: entities
      description: Query affected entities
      operations:
      - method: GET
        name: list-entities
        description: List entities matching a selector
        call: entities-v2.list-entities
        with:
          entitySelector: rest.entitySelector
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          fields: rest.fields
          from: rest.from
          to: rest.to
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/{entityId}
      name: entity-detail
      description: Get entity details
      operations:
      - method: GET
        name: get-entity
        description: Get entity details for root cause investigation
        call: entities-v2.get-entity
        with:
          entityId: rest.entityId
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: incident-response-mcp
    transport: http
    description: MCP server for AI-assisted Dynatrace incident response.
    tools:
    - name: list-problems
      description: List problems detected by Davis AI in the Dynatrace environment
      hints:
        readOnly: true
        openWorld: true
      call: problems-v2.list-problems
      with:
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        problemSelector: tools.problemSelector
        entitySelector: tools.entitySelector
        from: tools.from
        to: tools.to
        sort: tools.sort
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: get-problem
      description: Get full details of a specific problem including root cause analysis
      hints:
        readOnly: true
        openWorld: true
      call: problems-v2.get-problem
      with:
        problemId: tools.problemId
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: close-problem
      description: Close an open problem with an optional closing message
      hints:
        readOnly: false
        destructive: true
        openWorld: true
      call: problems-v2.close-problem
      with:
        problemId: tools.problemId
        message: tools.message
      outputParameters:
      - type: object
        mapping: $.
    - name: list-problem-comments
      description: List investigation comments on a problem
      hints:
        readOnly: true
        openWorld: true
      call: problems-v2.list-problem-comments
      with:
        problemId: tools.problemId
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: create-problem-comment
      description: Add an investigation comment to a problem
      hints:
        readOnly: false
        openWorld: true
      call: problems-v2.create-problem-comment
      with:
        problemId: tools.problemId
        message: tools.message
        context: tools.context
      outputParameters:
      - type: object
        mapping: $.
    - name: get-problem-comment
      description: Get a specific comment on a problem
      hints:
        readOnly: true
        openWorld: true
      call: problems-v2.get-problem-comment
      with:
        problemId: tools.problemId
        commentId: tools.commentId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-problem-comment
      description: Update an investigation comment
      hints:
        readOnly: false
        idempotent: true
        openWorld: true
      call: problems-v2.update-problem-comment
      with:
        problemId: tools.problemId
        commentId: tools.commentId
        message: tools.message
        context: tools.context
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-problem-comment
      description: Delete a comment from a problem
      hints:
        readOnly: false
        destructive: true
        idempotent: true
        openWorld: true
      call: problems-v2.delete-problem-comment
      with:
        problemId: tools.problemId
        commentId: tools.commentId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-events
      description: List events in the Dynatrace environment
      hints:
        readOnly: true
        openWorld: true
      call: events-v2.list-events
      with:
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        from: tools.from
        to: tools.to
        eventSelector: tools.eventSelector
        entitySelector: tools.entitySelector
        eventType: tools.eventType
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event
      description: Get details of a specific event
      hints:
        readOnly: true
        openWorld: true
      call: events-v2.get-event
      with:
        eventId: tools.eventId
      outputParameters:
      - type: object
        mapping: $.
    - name: ingest-event
      description: Ingest a custom event to annotate the timeline
      hints:
        readOnly: false
        openWorld: true
      call: events-v2.ingest-event
      with:
        event_type: tools.event_type
        title: tools.title
        entity_selector: tools.entity_selector
        start_time: tools.start_time
        end_time: tools.end_time
        properties: tools.properties
      outputParameters:
      - type: object
        mapping: $.
    - name: list-entities
      description: List monitored entities matching a selector
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.list-entities
      with:
        entitySelector: tools.entitySelector
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        fields: tools.fields
        from: tools.from
        to: tools.to
      outputParameters:
      - type: object
        mapping: $.
    - name: get-entity
      description: Get details of a specific monitored entity
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.get-entity
      with:
        entityId: tools.entityId
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
