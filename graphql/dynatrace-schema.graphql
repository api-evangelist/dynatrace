  eventType: String!
  category: String
  entityId: String
  user: String
  userType: String
  patch: JSON
  timestamp: DateTime!
  success: Boolean
  message: String
}

"""A business event ingested for business observability."""
type BusinessEvent {
  id: ID!
  eventType: String!
  eventProvider: String
  timestamp: DateTime!
  data: JSON
}

