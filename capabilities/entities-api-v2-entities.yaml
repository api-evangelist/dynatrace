      path: /entities/lookup
      operations:
      - name: lookupentity
        method: POST
        description: Dynatrace Look up Entity by Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: entities-entityId
      path: /entities/{entityId}
      operations:
      - name: getentity
        method: GET
        description: Dynatrace Get Entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entityId
          in: path
          type: string
          description: The unique identifier of the entity to retrieve, in the format TYPE-HEXADECIMALID, e.g., SERVICE-1234567890ABCDEF.
          required: true
        - name: fields
          in: query
          type: string
          description: Defines additional fields to include in the response. Use a comma-separated list prefixed with +, e.g.,
            +properties,+tags.
        - name: from
          in: query
