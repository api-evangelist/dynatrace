naftiko: 1.0.0-alpha2
info:
  label: Dynatrace Monitoring And Observability
  description: Unified monitoring and observability workflow combining metrics, logs, events, and entity data for ops engineers
    managing infrastructure health and performance.
  tags:
  - Dynatrace
  - Monitoring
  - Observability
  - Ops Engineering
  - Metrics
  - Logs
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    DYNATRACE_API_TOKEN: DYNATRACE_API_TOKEN
    DYNATRACE_ENVIRONMENT_ID: DYNATRACE_ENVIRONMENT_ID
capability:
  consumes:
  - type: http
    namespace: metrics-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Metrics API v2 for querying, ingesting, and managing time-series metrics.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: metrics
      path: /metrics
      description: List metric descriptors
      operations:
      - name: list-metrics
        method: GET
        description: Returns a list of all metrics available in the environment.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of metric descriptors to return per page.
        - name: metricSelector
          in: query
          type: string
          required: false
          description: Metric selector to filter metrics.
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to include in the response.
        - name: writtenSince
          in: query
          type: string
          required: false
          description: Filter to metrics written since this time.
        - name: metricDescriptors
          in: query
          type: boolean
          required: false
          description: Whether to include descriptor details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metric-descriptor
      path: /metrics/{metricKey}
      description: Get or delete a specific metric
      operations:
      - name: get-metric-descriptor
        method: GET
        description: Returns the descriptor for the specified metric key.
        inputParameters:
        - name: metricKey
          in: path
          type: string
          required: true
          description: The key of the metric.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-custom-metric
        method: DELETE
        description: Deletes the specified custom metric from the environment.
        inputParameters:
        - name: metricKey
          in: path
          type: string
          required: true
          description: The key of the custom metric to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metric-query
      path: /metrics/query
      description: Query metric data points
      operations:
      - name: query-metric-data
        method: GET
        description: Returns data points for the specified metrics.
        inputParameters:
        - name: metricSelector
          in: query
          type: string
          required: true
          description: Metric selector expression.
        - name: resolution
          in: query
          type: string
          required: false
          description: Desired time resolution, e.g., 5m, 1h.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: entitySelector
          in: query
          type: string
          required: false
          description: Filter to entities matching this selector.
        - name: mzSelector
          in: query
          type: string
          required: false
          description: Filter to a management zone.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metric-ingest
      path: /metrics/ingest
      description: Ingest custom metrics
      operations:
      - name: ingest-custom-metrics
        method: POST
        description: Ingests custom metric data points using MINT line protocol.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: text
          data: '{{tools.metric_lines}}'
  - type: http
    namespace: log-monitoring-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Log Monitoring API v2 for searching, ingesting, aggregating, and exporting logs.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: log-search
      path: /logs/search
      description: Search log records
      operations:
      - name: search-logs
        method: GET
        description: Searches log records stored in Grail using a query expression.
        inputParameters:
        - name: nextSliceKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of log records to return.
        - name: query
          in: query
          type: string
          required: false
          description: DQL log search query.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order for results.
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to include in the log records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: log-ingest
      path: /logs/ingest
      description: Ingest log records
      operations:
      - name: ingest-logs
        method: POST
        description: Ingests log records into the Dynatrace Grail data lakehouse.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: '{{tools.log_records}}'
    - name: log-aggregate
      path: /logs/aggregate
      description: Aggregate log data
      operations:
      - name: aggregate-logs
        method: GET
        description: Returns aggregated log data grouped by specified fields.
        inputParameters:
        - name: query
          in: query
          type: string
          required: false
          description: Log query for filtering before aggregation.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: groupBy
          in: query
          type: string
          required: false
          description: Fields to group the aggregated results by.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: log-export
      path: /logs/export
      description: Export log records
      operations:
      - name: export-logs
        method: GET
        description: Exports log records for bulk retrieval.
        inputParameters:
        - name: nextSliceKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of export results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of log records to return per page.
        - name: query
          in: query
          type: string
          required: false
          description: Log export query for filtering.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order for export results.
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to include in the exported records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: events-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Events API v2 for querying and ingesting custom events.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: events
      path: /events
      description: Query events
      operations:
      - name: list-events
        method: GET
        description: Returns a list of events matching the specified filters.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of events to return per page.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the queried time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the queried time range.
        - name: eventSelector
          in: query
          type: string
          required: false
          description: Event selector expression.
        - name: entitySelector
          in: query
          type: string
          required: false
          description: Entity selector to filter events by affected entities.
        - name: eventType
          in: query
          type: string
          required: false
          description: Filter by event type.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-detail
      path: /events/{eventId}
      description: Get a specific event
      operations:
      - name: get-event
        method: GET
        description: Returns the details of a specific event by ID.
        inputParameters:
        - name: eventId
          in: path
          type: string
          required: true
          description: The unique identifier of the event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-ingest
      path: /events/ingest
      description: Ingest custom events
      operations:
      - name: ingest-event
        method: POST
        description: Ingests a custom event into the Dynatrace environment.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            eventType: '{{tools.event_type}}'
            title: '{{tools.title}}'
            entitySelector: '{{tools.entity_selector}}'
            startTime: '{{tools.start_time}}'
            endTime: '{{tools.end_time}}'
            properties: '{{tools.properties}}'
  - type: http
    namespace: entities-v2
    baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
    description: Dynatrace Entities API v2 for querying monitored entities and entity types.
    authentication:
      type: apikey
      key: Authorization
      value: Api-Token {{DYNATRACE_API_TOKEN}}
      placement: header
    resources:
    - name: entities
      path: /entities
      description: Query monitored entities
      operations:
      - name: list-entities
        method: GET
        description: Returns a list of monitored entities matching the specified entity selector.
        inputParameters:
        - name: entitySelector
          in: query
          type: string
          required: true
          description: Entity selector expression, e.g., type(SERVICE).
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of entities to return per page.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include, e.g., +properties,+tags.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the time range for entity discovery.
        - name: to
          in: query
          type: string
          required: false
          description: End of the time range for entity discovery.
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order, e.g., +displayName or -lastSeenTms.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-detail
      path: /entities/{entityId}
      description: Get a specific entity by ID
      operations:
      - name: get-entity
        method: GET
        description: Returns the details of a specific monitored entity by its entity ID.
        inputParameters:
        - name: entityId
          in: path
          type: string
          required: true
          description: The unique identifier of the entity.
        - name: fields
          in: query
          type: string
          required: false
          description: Additional fields to include.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the time range.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-types
      path: /entityTypes
      description: Query entity type definitions
      operations:
      - name: list-entity-types
        method: GET
        description: Returns a list of all entity types available in the environment.
        inputParameters:
        - name: nextPageKey
          in: query
          type: string
          required: false
          description: Cursor for the next page of results.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of entity types to return per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-type-detail
      path: /entityTypes/{type}
      description: Get a specific entity type definition
      operations:
      - name: get-entity-type
        method: GET
        description: Returns the definition of a specific entity type.
        inputParameters:
        - name: type
          in: path
          type: string
          required: true
          description: The entity type identifier, e.g., SERVICE, HOST.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entity-lookup
      path: /entities/lookup
      description: Look up entity by name
      operations:
      - name: lookup-entity
        method: POST
        description: Looks up a specific entity by its display name and type.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            type: '{{tools.type}}'
  exposes:
  - type: rest
    port: 8081
    namespace: monitoring-observability-api
    description: Unified REST API for Dynatrace monitoring and observability workflows.
    resources:
    - path: /v1/metrics
      name: metrics
      description: List metric descriptors
      operations:
      - method: GET
        name: list-metrics
        description: List all available metrics
        call: metrics-v2.list-metrics
        with:
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          metricSelector: rest.metricSelector
          fields: rest.fields
          writtenSince: rest.writtenSince
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/{metricKey}
      name: metric-descriptor
      description: Get metric descriptor
      operations:
      - method: GET
        name: get-metric-descriptor
        description: Get descriptor for a specific metric
        call: metrics-v2.get-metric-descriptor
        with:
          metricKey: rest.metricKey
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-custom-metric
        description: Delete a custom metric
        call: metrics-v2.delete-custom-metric
        with:
          metricKey: rest.metricKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/query
      name: metric-query
      description: Query metric data points
      operations:
      - method: GET
        name: query-metric-data
        description: Query metric data with selectors and time ranges
        call: metrics-v2.query-metric-data
        with:
          metricSelector: rest.metricSelector
          resolution: rest.resolution
          from: rest.from
          to: rest.to
          entitySelector: rest.entitySelector
          mzSelector: rest.mzSelector
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/ingest
      name: metric-ingest
      description: Ingest custom metrics
      operations:
      - method: POST
        name: ingest-custom-metrics
        description: Ingest custom metrics via MINT protocol
        call: metrics-v2.ingest-custom-metrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/search
      name: log-search
      description: Search log records
      operations:
      - method: GET
        name: search-logs
        description: Search logs using DQL queries
        call: log-monitoring-v2.search-logs
        with:
          nextSliceKey: rest.nextSliceKey
          limit: rest.limit
          query: rest.query
          from: rest.from
          to: rest.to
          sort: rest.sort
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/ingest
      name: log-ingest
      description: Ingest log records
      operations:
      - method: POST
        name: ingest-logs
        description: Ingest logs into Grail
        call: log-monitoring-v2.ingest-logs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/aggregate
      name: log-aggregate
      description: Aggregate log data
      operations:
      - method: GET
        name: aggregate-logs
        description: Aggregate logs by dimensions
        call: log-monitoring-v2.aggregate-logs
        with:
          query: rest.query
          from: rest.from
          to: rest.to
          groupBy: rest.groupBy
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/export
      name: log-export
      description: Export log records
      operations:
      - method: GET
        name: export-logs
        description: Export logs for bulk retrieval
        call: log-monitoring-v2.export-logs
        with:
          nextSliceKey: rest.nextSliceKey
          pageSize: rest.pageSize
          query: rest.query
          from: rest.from
          to: rest.to
          sort: rest.sort
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events
      name: events
      description: Query events
      operations:
      - method: GET
        name: list-events
        description: List events
        call: events-v2.list-events
        with:
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          from: rest.from
          to: rest.to
          eventSelector: rest.eventSelector
          entitySelector: rest.entitySelector
          eventType: rest.eventType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities
      name: entities
      description: Query monitored entities
      operations:
      - method: GET
        name: list-entities
        description: List entities matching a selector
        call: entities-v2.list-entities
        with:
          entitySelector: rest.entitySelector
          nextPageKey: rest.nextPageKey
          pageSize: rest.pageSize
          fields: rest.fields
          from: rest.from
          to: rest.to
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/{entityId}
      name: entity-detail
      description: Get entity details
      operations:
      - method: GET
        name: get-entity
        description: Get entity details
        call: entities-v2.get-entity
        with:
          entityId: rest.entityId
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: monitoring-observability-mcp
    transport: http
    description: MCP server for AI-assisted Dynatrace monitoring and observability.
    tools:
    - name: list-metrics
      description: List all available metric descriptors
      hints:
        readOnly: true
        openWorld: true
      call: metrics-v2.list-metrics
      with:
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        metricSelector: tools.metricSelector
        fields: tools.fields
        writtenSince: tools.writtenSince
      outputParameters:
      - type: object
        mapping: $.
    - name: get-metric-descriptor
      description: Get the descriptor for a specific metric
      hints:
        readOnly: true
        openWorld: true
      call: metrics-v2.get-metric-descriptor
      with:
        metricKey: tools.metricKey
      outputParameters:
      - type: object
        mapping: $.
    - name: query-metric-data
      description: Query metric data points with selectors and time ranges
      hints:
        readOnly: true
        openWorld: true
      call: metrics-v2.query-metric-data
      with:
        metricSelector: tools.metricSelector
        resolution: tools.resolution
        from: tools.from
        to: tools.to
        entitySelector: tools.entitySelector
        mzSelector: tools.mzSelector
      outputParameters:
      - type: object
        mapping: $.
    - name: ingest-custom-metrics
      description: Ingest custom metric data points via MINT protocol
      hints:
        readOnly: false
        openWorld: true
      call: metrics-v2.ingest-custom-metrics
      with:
        metric_lines: tools.metric_lines
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-custom-metric
      description: Delete a custom metric from the environment
      hints:
        readOnly: false
        destructive: true
        idempotent: true
        openWorld: true
      call: metrics-v2.delete-custom-metric
      with:
        metricKey: tools.metricKey
      outputParameters:
      - type: object
        mapping: $.
    - name: search-logs
      description: Search log records using DQL queries
      hints:
        readOnly: true
        openWorld: true
      call: log-monitoring-v2.search-logs
      with:
        nextSliceKey: tools.nextSliceKey
        limit: tools.limit
        query: tools.query
        from: tools.from
        to: tools.to
        sort: tools.sort
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: ingest-logs
      description: Ingest log records into Dynatrace Grail
      hints:
        readOnly: false
        openWorld: true
      call: log-monitoring-v2.ingest-logs
      with:
        log_records: tools.log_records
      outputParameters:
      - type: object
        mapping: $.
    - name: aggregate-logs
      description: Aggregate log data grouped by specified fields
      hints:
        readOnly: true
        openWorld: true
      call: log-monitoring-v2.aggregate-logs
      with:
        query: tools.query
        from: tools.from
        to: tools.to
        groupBy: tools.groupBy
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: export-logs
      description: Export log records for bulk retrieval
      hints:
        readOnly: true
        openWorld: true
      call: log-monitoring-v2.export-logs
      with:
        nextSliceKey: tools.nextSliceKey
        pageSize: tools.pageSize
        query: tools.query
        from: tools.from
        to: tools.to
        sort: tools.sort
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: list-events
      description: List events from the Dynatrace environment
      hints:
        readOnly: true
        openWorld: true
      call: events-v2.list-events
      with:
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        from: tools.from
        to: tools.to
        eventSelector: tools.eventSelector
        entitySelector: tools.entitySelector
        eventType: tools.eventType
      outputParameters:
      - type: object
        mapping: $.
    - name: list-entities
      description: List monitored entities matching a selector
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.list-entities
      with:
        entitySelector: tools.entitySelector
        nextPageKey: tools.nextPageKey
        pageSize: tools.pageSize
        fields: tools.fields
        from: tools.from
        to: tools.to
      outputParameters:
      - type: object
        mapping: $.
    - name: get-entity
      description: Get details of a specific monitored entity
      hints:
        readOnly: true
        openWorld: true
      call: entities-v2.get-entity
      with:
        entityId: tools.entityId
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
