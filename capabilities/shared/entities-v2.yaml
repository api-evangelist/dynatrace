naftiko: "1.0.0-alpha1"

info:
  label: "Dynatrace Entities API v2"
  description: "The Dynatrace Entities API v2 enables querying of monitored entities such as services, hosts, processes, process groups, and applications within a Dynatrace environment."
  tags:
    - Dynatrace
    - Entities
    - Topology
    - Infrastructure
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      DYNATRACE_API_TOKEN: DYNATRACE_API_TOKEN
      DYNATRACE_ENVIRONMENT_ID: DYNATRACE_ENVIRONMENT_ID

capability:
  consumes:
    - type: http
      namespace: entities-v2
      baseUri: https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2
      description: "Dynatrace Entities API v2 for querying monitored entities and entity types."
      authentication:
        type: apikey
        key: Authorization
        value: "Api-Token {{DYNATRACE_API_TOKEN}}"
        placement: header
      resources:
        - name: entities
          path: /entities
          description: "Query monitored entities"
          operations:
            - name: list-entities
              method: GET
              description: "Returns a list of monitored entities matching the specified entity selector."
              inputParameters:
                - name: entitySelector
                  in: query
                  type: string
                  required: true
                  description: "Entity selector expression, e.g., type(SERVICE)."
                - name: nextPageKey
                  in: query
                  type: string
                  required: false
                  description: "Cursor for the next page of results."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of entities to return per page."
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Additional fields to include, e.g., +properties,+tags."
                - name: from
                  in: query
                  type: string
                  required: false
                  description: "Start of the time range for entity discovery."
                - name: to
                  in: query
                  type: string
                  required: false
                  description: "End of the time range for entity discovery."
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort order, e.g., +displayName or -lastSeenTms."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: entity-detail
          path: /entities/{entityId}
          description: "Get a specific entity by ID"
          operations:
            - name: get-entity
              method: GET
              description: "Returns the details of a specific monitored entity by its entity ID."
              inputParameters:
                - name: entityId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the entity."
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Additional fields to include."
                - name: from
                  in: query
                  type: string
                  required: false
                  description: "Start of the time range."
                - name: to
                  in: query
                  type: string
                  required: false
                  description: "End of the time range."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: entity-types
          path: /entityTypes
          description: "Query entity type definitions"
          operations:
            - name: list-entity-types
              method: GET
              description: "Returns a list of all entity types available in the environment."
              inputParameters:
                - name: nextPageKey
                  in: query
                  type: string
                  required: false
                  description: "Cursor for the next page of results."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of entity types to return per page."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: entity-type-detail
          path: /entityTypes/{type}
          description: "Get a specific entity type definition"
          operations:
            - name: get-entity-type
              method: GET
              description: "Returns the definition of a specific entity type."
              inputParameters:
                - name: type
                  in: path
                  type: string
                  required: true
                  description: "The entity type identifier, e.g., SERVICE, HOST."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: entity-lookup
          path: /entities/lookup
          description: "Look up entity by name"
          operations:
            - name: lookup-entity
              method: POST
              description: "Looks up a specific entity by its display name and type."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"

  exposes:
    - type: rest
      port: 8101
      namespace: entities-v2-api
      resources:
        - path: /v1/entities
          name: entities
          description: "Query monitored entities"
          operations:
            - method: GET
              name: list-entities
              description: "List entities matching a selector"
              call: "entities-v2.list-entities"
              with:
                entitySelector: "rest.entitySelector"
                nextPageKey: "rest.nextPageKey"
                pageSize: "rest.pageSize"
                fields: "rest.fields"
                from: "rest.from"
                to: "rest.to"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/entities/{entityId}
          name: entity-detail
          description: "Get a specific entity"
          operations:
            - method: GET
              name: get-entity
              description: "Get entity details by ID"
              call: "entities-v2.get-entity"
              with:
                entityId: "rest.entityId"
                fields: "rest.fields"
                from: "rest.from"
                to: "rest.to"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/entity-types
          name: entity-types
          description: "Query entity types"
          operations:
            - method: GET
              name: list-entity-types
              description: "List all entity types"
              call: "entities-v2.list-entity-types"
              with:
                nextPageKey: "rest.nextPageKey"
                pageSize: "rest.pageSize"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/entity-types/{type}
          name: entity-type-detail
          description: "Get entity type definition"
          operations:
            - method: GET
              name: get-entity-type
              description: "Get a specific entity type definition"
              call: "entities-v2.get-entity-type"
              with:
                type: "rest.type"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/entities/lookup
          name: entity-lookup
          description: "Look up entity by name"
          operations:
            - method: POST
              name: lookup-entity
              description: "Look up an entity by display name and type"
              call: "entities-v2.lookup-entity"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: entities-v2-mcp
      transport: http
      tools:
        - name: list-entities
          description: "List monitored entities matching an entity selector"
          hints:
            readOnly: true
            openWorld: true
          call: "entities-v2.list-entities"
          with:
            entitySelector: "tools.entitySelector"
            nextPageKey: "tools.nextPageKey"
            pageSize: "tools.pageSize"
            fields: "tools.fields"
            from: "tools.from"
            to: "tools.to"
            sort: "tools.sort"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-entity
          description: "Get details of a specific monitored entity"
          hints:
            readOnly: true
            openWorld: true
          call: "entities-v2.get-entity"
          with:
            entityId: "tools.entityId"
            fields: "tools.fields"
            from: "tools.from"
            to: "tools.to"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-entity-types
          description: "List all entity types available in the environment"
          hints:
            readOnly: true
            openWorld: true
          call: "entities-v2.list-entity-types"
          with:
            nextPageKey: "tools.nextPageKey"
            pageSize: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-entity-type
          description: "Get the definition of a specific entity type"
          hints:
            readOnly: true
            openWorld: true
          call: "entities-v2.get-entity-type"
          with:
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
        - name: lookup-entity
          description: "Look up an entity by its display name and type"
          hints:
            readOnly: true
            idempotent: true
            openWorld: true
          call: "entities-v2.lookup-entity"
          with:
            name: "tools.name"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
