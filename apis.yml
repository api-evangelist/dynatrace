- aid: dynatrace:dynatrace-openpipeline-api
  name: Dynatrace OpenPipeline API
  tags:
  - Data Ingestion
  - Data Pipelines
  - Observability
  - Platform
  humanURL: https://docs.dynatrace.com/docs/discover-dynatrace/platform/openpipeline/reference/openpipeline-api
